name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    if: ${{ !endsWith(github.ref_name, '-legacy') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      # macOS: sign the app and DMG via APPLE_* (see https://v1.tauri.app/v1/guides/distribution/sign-macos).
      # Do not set APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID (or API key trio) here — that skips notarization.
      # Notarization needs a paid Apple Developer Program membership; signing alone does not require it.
      #
      # Updater (Tauri v2): set repo secret TAURI_SIGNING_PRIVATE_KEY to the full contents of
      # src-tauri/.updater/signing.key (must match pubkey in tauri.conf.json). See:
      # https://v2.tauri.app/plugin/updater/
      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Safari Client v__VERSION__
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  # Legacy channel manifest: copy highest legacy release's latest.json so
  # .../releases/latest/download/latest-legacy.json stays in sync for legacy builds.
  sync-legacy-updater:
    name: Attach latest-legacy.json from highest legacy release
    if: ${{ !endsWith(github.ref_name, '-legacy') }}
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Copy latest.json from highest legacy release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          LEGACY_TAG=$(gh release list --repo "$REPO" --limit 100 --json tagName -q '.[].tagName' | grep -E '^v.*-legacy$' | sort -V | tail -1 || true)
          if [[ -z "${LEGACY_TAG:-}" ]]; then
            echo "No legacy release found; skipping latest-legacy.json."
            exit 0
          fi
          mkdir -p /tmp/gh-assets
          if ! gh release download "$LEGACY_TAG" --repo "$REPO" --pattern 'latest.json' -D /tmp/gh-assets 2>/dev/null; then
            echo "No latest.json on legacy release $LEGACY_TAG (skip)."
            exit 0
          fi
          if [[ ! -f /tmp/gh-assets/latest.json ]]; then
            exit 0
          fi
          cp /tmp/gh-assets/latest.json latest-legacy.json
          gh release upload "$TAG" latest-legacy.json --repo "$REPO" --clobber
          echo "Uploaded latest-legacy.json from $LEGACY_TAG to $TAG."
