name: Release (legacy WebKit)

on:
  push:
    tags:
      - "v*-legacy"

permissions:
  contents: write

jobs:
  publish:
    if: ${{ endsWith(github.ref_name, '-legacy') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Safari Client ${{ github.ref_name }} (legacy WebKit)
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  # tauri-action uploads latest.json on the legacy tag release. Legacy apps resolve
  # .../releases/latest/download/latest-legacy.json, so we mirror the same manifest onto
  # the current published non-legacy "latest" release (see release.yml for the other direction).
  upstream-alias:
    name: Upload latest-legacy.json to latest release
    if: ${{ endsWith(github.ref_name, '-legacy') }}
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Attach latest-legacy.json to releases/latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          LEGACY_TAG="${{ github.ref_name }}"
          mkdir -p /tmp/gh-assets
          if ! gh release download "$LEGACY_TAG" --repo "$REPO" --pattern 'latest.json' -D /tmp/gh-assets 2>/dev/null; then
            echo "No latest.json on release $LEGACY_TAG (skip)."
            exit 0
          fi
          if [[ ! -f /tmp/gh-assets/latest.json ]]; then
            exit 0
          fi
          cp /tmp/gh-assets/latest.json latest-legacy.json
          if ! LATEST_TAG=$(gh api "repos/$REPO/releases/latest" --jq .tag_name 2>/dev/null); then
            echo "No published latest release; cannot attach latest-legacy.json."
            exit 0
          fi
          if [[ "$LATEST_TAG" == *-legacy ]]; then
            echo "Latest release tag ends with -legacy; refusing to upload (unexpected)."
            exit 0
          fi
          gh release upload "$LATEST_TAG" latest-legacy.json --repo "$REPO" --clobber
          echo "Uploaded latest-legacy.json to latest release $LATEST_TAG (from legacy $LEGACY_TAG)."
