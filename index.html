<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Download Safari Client — a desktop app for Safari Fotosub-style competitions. Choose your operating system below."
    />
    <title>Safari Client — Download</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg0: #0c0f14;
        --bg1: #141a24;
        --card: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.1);
        --text: #f2f4f8;
        --muted: #9aa3b5;
        --accent: #3d9cf0;
        --accent-dim: rgba(61, 156, 240, 0.15);
        --success: #4ade80;
        --radius: 16px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "DM Sans", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(
            1200px 600px at 10% -10%,
            rgba(61, 156, 240, 0.18),
            transparent 55%
          ),
          radial-gradient(
            900px 500px at 90% 0%,
            rgba(147, 112, 219, 0.12),
            transparent 50%
          ),
          linear-gradient(165deg, var(--bg0), var(--bg1) 55%, #0a0d12);
        line-height: 1.5;
      }

      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: clamp(2rem, 5vw, 3.5rem) 1.25rem 4rem;
      }

      header {
        text-align: center;
        margin-bottom: 2.75rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        background: var(--accent-dim);
        border: 1px solid rgba(61, 156, 240, 0.25);
        margin-bottom: 1.25rem;
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 10px var(--success);
      }

      h1 {
        font-family: "Instrument Serif", Georgia, serif;
        font-size: clamp(2.25rem, 6vw, 3.25rem);
        font-weight: 400;
        letter-spacing: -0.02em;
        margin: 0 0 0.75rem;
        line-height: 1.15;
      }

      .lede {
        font-size: 1.125rem;
        color: var(--muted);
        max-width: 34rem;
        margin: 0 auto;
      }

      .version {
        margin-top: 1rem;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .version strong {
        color: var(--text);
        font-weight: 600;
      }

      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }

      @media (min-width: 640px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding: 1.35rem 1.35rem 1.25rem;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        transition: border-color 0.2s ease, transform 0.2s ease;
      }

      .card:hover {
        border-color: rgba(61, 156, 240, 0.35);
      }

      .card:focus-within {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .icon {
        flex-shrink: 0;
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .icon svg {
        width: 26px;
        height: 26px;
        opacity: 0.95;
      }

      .card h2 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .card p {
        margin: 0.25rem 0 0;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: auto;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        color: #0c0f14;
        background: linear-gradient(180deg, #e8f4ff 0%, #b8d9f8 100%);
        border: none;
        cursor: pointer;
        transition: filter 0.15s ease, transform 0.1s ease;
      }

      .btn:hover {
        filter: brightness(1.05);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn[disabled],
      .btn.is-disabled {
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }

      .btn svg {
        width: 18px;
        height: 18px;
      }

      .note {
        margin-top: 2.5rem;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        font-size: 0.9rem;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      footer {
        margin-top: 2.5rem;
        text-align: center;
        font-size: 0.875rem;
        color: var(--muted);
      }

      footer a {
        color: var(--accent);
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      .loading {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
      }

      .loading-spinner {
        width: 36px;
        height: 36px;
        margin: 0 auto 1rem;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-banner {
        margin-bottom: 1.5rem;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fecaca;
        font-size: 0.95rem;
      }

      .hidden {
        display: none !important;
      }

      .lang-switch {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        margin-bottom: 1rem;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .lang-switch span[aria-hidden="true"] {
        opacity: 0.4;
        user-select: none;
      }

      .lang-btn {
        font: inherit;
        padding: 0.25rem 0.5rem;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .lang-btn:hover {
        color: var(--text);
      }

      .lang-btn[aria-current="true"] {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
        background: var(--accent-dim);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div
          class="lang-switch"
          role="navigation"
          aria-label="Language"
          id="lang-switch"
        >
          <button type="button" class="lang-btn" data-set-lang="en" aria-current="true">
            English
          </button>
          <span aria-hidden="true">·</span>
          <button type="button" class="lang-btn" data-set-lang="it">Italiano</button>
        </div>
        <div class="badge">
          <span class="badge-dot" aria-hidden="true"></span>
          <span data-i18n="badge">Official downloads</span>
        </div>
        <h1>Safari Client</h1>
        <p class="lede" data-i18n="lede">
          Desktop app for Safari Fotosub-style competitions (scheda concorrente). Pick the
          option that matches your computer — no account required.
        </p>
        <p class="version" id="version-line">
          <span id="version-text" data-i18n="version_checking">Checking latest version…</span>
        </p>
      </header>

      <div id="error-banner" class="error-banner hidden" role="alert"></div>

      <div id="loading" class="loading">
        <div class="loading-spinner" aria-hidden="true"></div>
        <p data-i18n="loading">Loading download links…</p>
      </div>

      <div id="content" class="hidden">
        <div class="grid" id="cards"></div>
        <p class="note" id="mac-note"></p>
      </div>

      <footer>
        <p>
          <a href="https://github.com/maxdrift/safari-client-tauri" data-i18n="footer_source"
            >Source code on GitHub</a
          >
          ·
          <a href="https://github.com/maxdrift/safari-client-tauri/releases" data-i18n="footer_releases"
            >All releases</a
          >
        </p>
      </footer>
    </div>

    <script>
      (function () {
        const REPO = "maxdrift/safari-client-tauri";
        const API = "https://api.github.com/repos/" + REPO + "/releases/latest";
        const STORAGE_KEY = "safari-client-landing-lang";

        const I18N = {
          en: {
            html_lang: "en",
            lang_switch_aria: "Language",
            title: "Safari Client — Download",
            meta_description:
              "Download Safari Client — a desktop app for Safari Fotosub-style competitions. Choose your operating system below.",
            badge: "Official downloads",
            lede:
              "Desktop app for Safari Fotosub-style competitions (scheda concorrente). Pick the option that matches your computer — no account required.",
            version_checking: "Checking latest version…",
            version_latest: "Latest release:",
            version_unknown: "Could not detect the latest version.",
            loading: "Loading download links…",
            note_mac:
              '<strong style="color: var(--text)">Mac users:</strong> If macOS says the app is from an unidentified developer, open it via <em>System Settings → Privacy &amp; Security</em> and choose Open anyway, or right-click the app and choose Open.',
            footer_source: "Source code on GitHub",
            footer_releases: "All releases",
            platform_mac_arm_title: "Mac — Apple Silicon",
            platform_mac_arm_subtitle: "M1, M2, M3, or newer",
            platform_mac_intel_title: "Mac — Intel",
            platform_mac_intel_subtitle: "Older Macs with Intel processors",
            platform_windows_title: "Windows",
            platform_windows_subtitle: "Windows 10 or 11 (64-bit)",
            platform_linux_title: "Linux",
            platform_linux_subtitle: "AppImage (most distros) or Debian package",
            download: "Download",
            download_deb: "Download .deb",
            download_appimage: "Download AppImage",
            not_available: "Not available in this release",
            error_no_assets:
              "The latest release has no downloadable files yet. Try the “All releases” link below, or check back after the next build.",
            error_fetch: "Could not load release information",
            error_network:
              "Network error. Open the GitHub releases page below to download manually.",
          },
          it: {
            html_lang: "it",
            lang_switch_aria: "Lingua",
            title: "Safari Client — Download",
            meta_description:
              "Scarica Safari Client, l’app desktop per gare in stile Safari Fotosub. Scegli il sistema operativo qui sotto.",
            badge: "Download ufficiali",
            lede:
              "App desktop per gare in stile Safari Fotosub (scheda concorrente). Scegli la versione adatta al tuo computer — non serve un account.",
            version_checking: "Ricerca dell’ultima versione…",
            version_latest: "Ultima release:",
            version_unknown: "Impossibile rilevare l’ultima versione.",
            loading: "Caricamento dei link di download…",
            note_mac:
              '<strong style="color: var(--text)">Utenti Mac:</strong> se macOS indica che l’app proviene da uno sviluppatore non identificato, aprila da <em>Impostazioni di Sistema → Privacy e sicurezza</em> con Apri comunque, oppure fai clic destro sull’app e scegli Apri.',
            footer_source: "Codice sorgente su GitHub",
            footer_releases: "Tutte le release",
            platform_mac_arm_title: "Mac — Apple Silicon",
            platform_mac_arm_subtitle: "M1, M2, M3 o più recenti",
            platform_mac_intel_title: "Mac — Intel",
            platform_mac_intel_subtitle: "Mac Intel meno recenti",
            platform_windows_title: "Windows",
            platform_windows_subtitle: "Windows 10 o 11 (64 bit)",
            platform_linux_title: "Linux",
            platform_linux_subtitle: "AppImage (molte distro) oppure pacchetto Debian",
            download: "Scarica",
            download_deb: "Scarica .deb",
            download_appimage: "Scarica AppImage",
            not_available: "Non disponibile in questa release",
            error_no_assets:
              "L’ultima release non contiene ancora file scaricabili. Prova il link «Tutte le release» qui sotto, o riprova dopo il prossimo build.",
            error_fetch: "Impossibile caricare le informazioni sulla release",
            error_network:
              "Errore di rete. Apri la pagina delle release su GitHub qui sotto per scaricare manualmente.",
          },
        };

        var currentLang;
        var lastFetch = null;
        var lastErrorKind = null;
        var lastFetchHttpStatus = null;

        function detectLang() {
          var params = new URLSearchParams(window.location.search);
          var q = params.get("lang");
          if (q === "it" || q === "en") return q;
          try {
            var s = localStorage.getItem(STORAGE_KEY);
            if (s === "it" || s === "en") return s;
          } catch (e) {}
          var nav = navigator.language || "";
          if (nav.toLowerCase().startsWith("it")) return "it";
          return "en";
        }

        function t(key) {
          var pack = I18N[currentLang] || I18N.en;
          return pack[key] !== undefined ? pack[key] : I18N.en[key] || key;
        }

        function setUrlLang(lang) {
          var url = new URL(window.location.href);
          if (lang === "en") url.searchParams.delete("lang");
          else url.searchParams.set("lang", lang);
          window.history.replaceState({}, "", url.pathname + url.search + url.hash);
        }

        function applyStaticCopy() {
          document.documentElement.lang = t("html_lang");
          document.title = t("title");
          var meta = document.querySelector('meta[name="description"]');
          if (meta) meta.setAttribute("content", t("meta_description"));

          document.querySelectorAll("[data-i18n]").forEach(function (el) {
            var key = el.getAttribute("data-i18n");
            if (key && I18N.en[key] !== undefined) el.textContent = t(key);
          });

          var note = document.getElementById("mac-note");
          if (note) note.innerHTML = t("note_mac");

          document.querySelectorAll(".lang-btn").forEach(function (btn) {
            var l = btn.getAttribute("data-set-lang");
            btn.setAttribute("aria-current", l === currentLang ? "true" : "false");
          });

          var langSwitch = document.getElementById("lang-switch");
          if (langSwitch) langSwitch.setAttribute("aria-label", t("lang_switch_aria"));
        }

        function platformDefs() {
          return [
            {
              id: "mac-arm",
              titleKey: "platform_mac_arm_title",
              subtitleKey: "platform_mac_arm_subtitle",
              match: function (name) {
                return /\.dmg$/i.test(name) && /aarch64|arm64/i.test(name);
              },
            },
            {
              id: "mac-intel",
              titleKey: "platform_mac_intel_title",
              subtitleKey: "platform_mac_intel_subtitle",
              match: function (name) {
                return (
                  /\.dmg$/i.test(name) &&
                  !/aarch64|arm64/i.test(name) &&
                  (/x86_64|_x64\.dmg/i.test(name) || /intel/i.test(name))
                );
              },
            },
            {
              id: "windows",
              titleKey: "platform_windows_title",
              subtitleKey: "platform_windows_subtitle",
              match: function (name) {
                return (
                  /\.msi$/i.test(name) ||
                  (/\.exe$/i.test(name) &&
                    /setup|installer|x64|win|en-US/i.test(name))
                );
              },
              fallback: function (assets) {
                return (
                  assets.find(function (a) {
                    return /\.msi$/i.test(a.name);
                  }) ||
                  assets.find(function (a) {
                    return /\.exe$/i.test(a.name);
                  })
                );
              },
            },
            {
              id: "linux",
              titleKey: "platform_linux_title",
              subtitleKey: "platform_linux_subtitle",
              match: function (name) {
                return /\.AppImage$/i.test(name) || /\.deb$/i.test(name);
              },
              prefer: function (candidates) {
                var appimage = candidates.find(function (c) {
                  return /\.AppImage$/i.test(c.name);
                });
                if (appimage) return appimage;
                var deb = candidates.find(function (c) {
                  return /\.deb$/i.test(c.name);
                });
                return deb || candidates[0];
              },
            },
          ];
        }

        function pickAsset(assets, platform) {
          var matches = assets.filter(function (a) {
            return platform.match(a.name);
          });
          if (matches.length > 0) {
            return platform.prefer ? platform.prefer(matches) : matches[0];
          }
          if (platform.fallback) return platform.fallback(assets);
          return null;
        }

        function iconSvg(id) {
          var icons = {
            "mac-arm":
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="11" rx="2"/><path d="M9 21h6M12 17v4"/></svg>',
            "mac-intel":
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="12" rx="2"/><path d="M8 20h8M9 16h6"/></svg>',
            windows:
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M3 5.5l7-1v6.5H3V5.5zm0 7.4l7 .9v6.6l-7-1v-6.5zm8 .1l9 1.2V5.2L11 4v8.9zm0 1.7V22l9-1.3v-7.1l-9-1.2z"/></svg>',
            linux:
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="7" rx="7" ry="3"/><path d="M5 7v6c0 1.66 3.13 3 7 3s7-1.34 7-3V7"/><path d="M5 13v2c0 1.66 3.13 3 7 3s7-1.34 7-3v-2"/></svg>',
          };
          return icons[id] || icons.linux;
        }

        function downloadLabel(filename) {
          var lower = filename.toLowerCase();
          if (lower.endsWith(".deb")) return t("download_deb");
          if (lower.endsWith(".appimage")) return t("download_appimage");
          return t("download");
        }

        function renderCards(assets, release) {
          var container = document.getElementById("cards");
          container.innerHTML = "";
          var PLATFORMS = platformDefs();

          PLATFORMS.forEach(function (p) {
            var asset = pickAsset(assets, p);
            var card = document.createElement("article");
            card.className = "card";
            card.setAttribute("aria-labelledby", "h-" + p.id);

            var head = document.createElement("div");
            head.className = "card-head";
            head.innerHTML =
              '<div class="icon">' +
              iconSvg(p.id) +
              '</div><div><h2 id="h-' +
              p.id +
              '">' +
              t(p.titleKey) +
              "</h2><p>" +
              t(p.subtitleKey) +
              "</p></div>";

            var btn = document.createElement("a");
            btn.className = "btn";
            if (asset) {
              btn.href = asset.browser_download_url;
              btn.download = "";
              btn.innerHTML =
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> ' +
                downloadLabel(asset.name);
            } else {
              btn.href = "#";
              btn.setAttribute("aria-disabled", "true");
              btn.classList.add("is-disabled");
              btn.textContent = t("not_available");
            }

            card.appendChild(head);
            card.appendChild(btn);
            container.appendChild(card);
          });

          var tag = (release && (release.tag_name || release.name)) || "";
          document.getElementById("version-text").innerHTML =
            t("version_latest") + " <strong>" + (tag || "—") + "</strong>";
        }

        function showErrorTranslated(kind, httpStatus) {
          lastErrorKind = kind;
          var el = document.getElementById("error-banner");
          var msg =
            kind === "no_assets"
              ? t("error_no_assets")
              : kind === "fetch"
                ? t("error_fetch") +
                  (httpStatus ? " (" + httpStatus + ")." : ".")
                : t("error_network");
          el.textContent = msg;
          el.classList.remove("hidden");
        }

        function hideError() {
          lastErrorKind = null;
          document.getElementById("error-banner").classList.add("hidden");
        }

        function setLang(lang) {
          if (lang !== "it" && lang !== "en") return;
          currentLang = lang;
          try {
            localStorage.setItem(STORAGE_KEY, lang);
          } catch (e) {}
          setUrlLang(lang);
          applyStaticCopy();

          if (lastFetch) {
            renderCards(lastFetch.assets, lastFetch.release);
            if (lastFetch.assets.length === 0) {
              showErrorTranslated("no_assets");
            } else {
              hideError();
            }
          } else if (lastErrorKind) {
            showErrorTranslated(
              lastErrorKind,
              lastErrorKind === "fetch" ? lastFetchHttpStatus : undefined
            );
          }
        }

        function wireLangButtons() {
          document.querySelectorAll(".lang-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var lang = btn.getAttribute("data-set-lang");
              if (lang) setLang(lang);
            });
          });
        }

        currentLang = detectLang();
        applyStaticCopy();
        wireLangButtons();

        function isInstallerAsset(name) {
          if (!name || /latest\.json$/i.test(name)) return false;
          if (/\.sig$/i.test(name)) return false;
          return true;
        }

        function runFetch() {
          fetch(API)
            .then(function (r) {
              lastFetchHttpStatus = r.status;
              if (!r.ok) {
                lastFetch = null;
                throw { kind: "fetch", status: r.status };
              }
              return r.json();
            })
            .then(function (release) {
              document.getElementById("loading").classList.add("hidden");
              document.getElementById("content").classList.remove("hidden");

              var assets = (release.assets || []).filter(function (a) {
                return isInstallerAsset(a.name);
              });
              lastFetch = { assets: assets, release: release };
              hideError();

              if (assets.length === 0) {
                showErrorTranslated("no_assets");
              }
              renderCards(assets, release);
            })
            .catch(function (err) {
              document.getElementById("loading").classList.add("hidden");
              document.getElementById("content").classList.remove("hidden");
              lastFetch = null;
              document.getElementById("version-text").textContent = t("version_unknown");

              if (err && err.kind === "fetch") {
                showErrorTranslated("fetch", err.status);
              } else {
                showErrorTranslated("network");
              }
              renderCards([], {});
            });
        }

        runFetch();
      })();
    </script>
  </body>
</html>
