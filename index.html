<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Download Safari Client — a desktop app for Safari Fotosub-style competitions. Choose your operating system below."
    />
    <title>Safari Client — Download</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg0: #0c0f14;
        --bg1: #141a24;
        --card: rgba(255, 255, 255, 0.06);
        --card-border: rgba(255, 255, 255, 0.1);
        --text: #f2f4f8;
        --muted: #9aa3b5;
        --accent: #3d9cf0;
        --accent-dim: rgba(61, 156, 240, 0.15);
        --success: #4ade80;
        --radius: 16px;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "DM Sans", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: radial-gradient(
            1200px 600px at 10% -10%,
            rgba(61, 156, 240, 0.18),
            transparent 55%
          ),
          radial-gradient(
            900px 500px at 90% 0%,
            rgba(147, 112, 219, 0.12),
            transparent 50%
          ),
          linear-gradient(165deg, var(--bg0), var(--bg1) 55%, #0a0d12);
        line-height: 1.5;
      }

      .wrap {
        max-width: 920px;
        margin: 0 auto;
        padding: clamp(2rem, 5vw, 3.5rem) 1.25rem 4rem;
      }

      header {
        text-align: center;
        margin-bottom: 2.75rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        background: var(--accent-dim);
        border: 1px solid rgba(61, 156, 240, 0.25);
        margin-bottom: 1.25rem;
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
        box-shadow: 0 0 10px var(--success);
      }

      h1 {
        font-family: "Nunito", "DM Sans", system-ui, sans-serif;
        font-size: clamp(2.35rem, 6vw, 3.35rem);
        font-weight: 800;
        letter-spacing: -0.035em;
        margin: 0 0 0.75rem;
        line-height: 1.12;
      }

      .lede {
        font-size: 1.125rem;
        color: var(--muted);
        max-width: 34rem;
        margin: 0 auto;
      }

      .version {
        margin-top: 1rem;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .version strong {
        color: var(--text);
        font-weight: 600;
      }

      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1fr;
      }

      @media (min-width: 640px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        padding: 1.35rem 1.35rem 1.25rem;
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        transition: border-color 0.2s ease, transform 0.2s ease;
      }

      .card:hover {
        border-color: rgba(61, 156, 240, 0.35);
      }

      .card:focus-within {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .icon {
        flex-shrink: 0;
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Simple Icons paths use fill: currentColor */
      .icon .si-svg {
        display: block;
        width: 26px;
        height: 26px;
      }

      .icon--linux .si-svg {
        width: 28px;
        height: 28px;
      }

      .icon svg path {
        fill: currentColor;
      }

      /* Apple (Simple Icons “Apple”) */
      .icon--mac {
        color: #f5f5f7;
        background: linear-gradient(145deg, #3a3a3c 0%, #1d1d1f 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      /* Microsoft Windows (Simple Icons “Windows”) */
      .icon--windows {
        color: #fff;
        background: #0078d4;
        border-color: rgba(0, 120, 212, 0.5);
      }

      /* Linux / Tux (Simple Icons “Linux”) */
      .icon--linux {
        color: #fcc624;
        background: linear-gradient(145deg, #2a2a2a 0%, #121212 100%);
        border-color: rgba(252, 198, 36, 0.28);
      }

      .card h2 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .card p {
        margin: 0.25rem 0 0;
        font-size: 0.9rem;
        color: var(--muted);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: auto;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        text-decoration: none;
        color: #0c0f14;
        background: linear-gradient(180deg, #e8f4ff 0%, #b8d9f8 100%);
        border: none;
        cursor: pointer;
        transition: filter 0.15s ease, transform 0.1s ease;
      }

      .btn:hover {
        filter: brightness(1.05);
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn[disabled],
      .btn.is-disabled {
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }

      .btn svg {
        width: 18px;
        height: 18px;
      }

      .note {
        margin-top: 2.5rem;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        font-size: 0.9rem;
        color: var(--muted);
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      footer {
        margin-top: 2.5rem;
        text-align: center;
        font-size: 0.875rem;
        color: var(--muted);
      }

      footer a {
        color: var(--accent);
        text-decoration: none;
      }

      footer a:hover {
        text-decoration: underline;
      }

      .loading {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--muted);
      }

      .loading-spinner {
        width: 36px;
        height: 36px;
        margin: 0 auto 1rem;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-banner {
        margin-bottom: 1.5rem;
        padding: 1rem 1.25rem;
        border-radius: 12px;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
        color: #fecaca;
        font-size: 0.95rem;
      }

      .hidden {
        display: none !important;
      }

      .lang-switch {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        margin-bottom: 1rem;
        font-size: 0.85rem;
        color: var(--muted);
      }

      .lang-switch span[aria-hidden="true"] {
        opacity: 0.4;
        user-select: none;
      }

      .lang-btn {
        font: inherit;
        padding: 0.25rem 0.5rem;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .lang-btn:hover {
        color: var(--text);
      }

      .lang-btn[aria-current="true"] {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
        background: var(--accent-dim);
      }
    </style>
  </head>

            platform_mac_arm_title: "Mac — Apple Silicon",
            platform_mac_arm_subtitle: "M1, M2, M3 o più recenti",
            platform_mac_intel_title: "Mac — Intel",
            platform_mac_intel_subtitle: "Mac Intel meno recenti",
            platform_windows_title: "Windows",
            platform_windows_subtitle: "Windows 10 o 11 (64 bit)",
            platform_linux_title: "Linux",
            platform_linux_subtitle: "AppImage (molte distro) oppure pacchetto Debian",
            download: "Scarica",
            download_deb: "Scarica .deb",
            download_appimage: "Scarica AppImage",
            not_available: "Non disponibile in questa release",
            error_no_assets:
              "L’ultima release non contiene ancora file scaricabili. Prova il link «Tutte le release» qui sotto, o riprova dopo il prossimo build.",
            error_fetch: "Impossibile caricare le informazioni sulla release",
            error_network:
              "Errore di rete. Apri la pagina delle release su GitHub qui sotto per scaricare manualmente.",
          },
        };

        var currentLang;
        var lastFetch = null;
        var lastErrorKind = null;
        var lastFetchHttpStatus = null;

        function detectLang() {
          var params = new URLSearchParams(window.location.search);
          var q = params.get("lang");
          if (q === "it" || q === "en") return q;
          try {
            var s = localStorage.getItem(STORAGE_KEY);
            if (s === "it" || s === "en") return s;
          } catch (e) {}
          var nav = navigator.language || "";
          if (nav.toLowerCase().startsWith("it")) return "it";
          return "en";
        }

        function t(key) {
          var pack = I18N[currentLang] || I18N.en;
          return pack[key] !== undefined ? pack[key] : I18N.en[key] || key;
        }

        function setUrlLang(lang) {
          var url = new URL(window.location.href);
          if (lang === "en") url.searchParams.delete("lang");
          else url.searchParams.set("lang", lang);
          window.history.replaceState({}, "", url.pathname + url.search + url.hash);
        }

        function applyStaticCopy() {
          document.documentElement.lang = t("html_lang");
          document.title = t("title");
          var meta = document.querySelector('meta[name="description"]');
          if (meta) meta.setAttribute("content", t("meta_description"));

          document.querySelectorAll("[data-i18n]").forEach(function (el) {
            var key = el.getAttribute("data-i18n");
            if (key && I18N.en[key] !== undefined) el.textContent = t(key);
          });

          var note = document.getElementById("mac-note");
          if (note) note.innerHTML = t("note_mac");

          document.querySelectorAll(".lang-btn").forEach(function (btn) {
            var l = btn.getAttribute("data-set-lang");
            btn.setAttribute("aria-current", l === currentLang ? "true" : "false");
          });

          var langSwitch = document.getElementById("lang-switch");
          if (langSwitch) langSwitch.setAttribute("aria-label", t("lang_switch_aria"));
        }

        function platformDefs() {
          return [
            {
              id: "mac-arm",
              titleKey: "platform_mac_arm_title",
              subtitleKey: "platform_mac_arm_subtitle",
              match: function (name) {
                return /\.dmg$/i.test(name) && /aarch64|arm64/i.test(name);
              },
            },
            {
              id: "mac-intel",
              titleKey: "platform_mac_intel_title",
              subtitleKey: "platform_mac_intel_subtitle",
              match: function (name) {
                return (
                  /\.dmg$/i.test(name) &&
                  !/aarch64|arm64/i.test(name) &&
                  (/x86_64|_x64\.dmg/i.test(name) || /intel/i.test(name))
                );
              },
            },
            {
              id: "windows",
              titleKey: "platform_windows_title",
              subtitleKey: "platform_windows_subtitle",
              match: function (name) {
                return (
                  /\.msi$/i.test(name) ||
                  (/\.exe$/i.test(name) &&
                    /setup|installer|x64|win|en-US/i.test(name))
                );
              },
              fallback: function (assets) {
                return (
                  assets.find(function (a) {
                    return /\.msi$/i.test(a.name);
                  }) ||
                  assets.find(function (a) {
                    return /\.exe$/i.test(a.name);
                  })
                );
              },
            },
            {
              id: "linux",
              titleKey: "platform_linux_title",
              subtitleKey: "platform_linux_subtitle",
              match: function (name) {
                return /\.AppImage$/i.test(name) || /\.deb$/i.test(name);
              },
              prefer: function (candidates) {
                var appimage = candidates.find(function (c) {
                  return /\.AppImage$/i.test(c.name);
                });
                if (appimage) return appimage;
                var deb = candidates.find(function (c) {
                  return /\.deb$/i.test(c.name);
                });
                return deb || candidates[0];
              },
            },
          ];
        }

        function pickAsset(assets, platform) {
          var matches = assets.filter(function (a) {
            return platform.match(a.name);
          });
          if (matches.length > 0) {
            return platform.prefer ? platform.prefer(matches) : matches[0];
          }
          if (platform.fallback) return platform.fallback(assets);
          return null;
        }

        function platformIconHtml(id) {
          var tplId =
            id === "windows"
              ? "si-windows-tpl"
              : id === "linux"
                ? "si-linux-tpl"
                : "si-apple-tpl";
          var tpl = document.getElementById(tplId);
          var mod =
            id === "windows"
              ? "icon--windows"
              : id === "linux"
                ? "icon--linux"
                : "icon--mac";
          if (!tpl || !tpl.content || !tpl.content.firstElementChild) {
            return '<div class="icon ' + mod + '" aria-hidden="true"></div>';
          }
          var svg = tpl.content.firstElementChild.cloneNode(true);
          svg.setAttribute("aria-hidden", "true");
          var wrap = document.createElement("div");
          wrap.className = "icon " + mod;
          wrap.appendChild(svg);
          return wrap.outerHTML;
        }

        function downloadLabel(filename) {
          var lower = filename.toLowerCase();
          if (lower.endsWith(".deb")) return t("download_deb");
          if (lower.endsWith(".appimage")) return t("download_appimage");
          return t("download");
        }

        function renderCards(assets, release) {
          var container = document.getElementById("cards");
          container.innerHTML = "";
          var PLATFORMS = platformDefs();

          PLATFORMS.forEach(function (p) {
            var asset = pickAsset(assets, p);
            var card = document.createElement("article");
            card.className = "card";
            card.setAttribute("aria-labelledby", "h-" + p.id);

            var head = document.createElement("div");
            head.className = "card-head";
            head.innerHTML =
              platformIconHtml(p.id) +
              '<div><h2 id="h-' +
              p.id +
              '">' +
              t(p.titleKey) +
              "</h2><p>" +
              t(p.subtitleKey) +
              "</p></div>";

            var btn = document.createElement("a");
            btn.className = "btn";
            if (asset) {
              btn.href = asset.browser_download_url;
              btn.download = "";
              btn.innerHTML =
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> ' +
                downloadLabel(asset.name);
            } else {
              btn.href = "#";
              btn.setAttribute("aria-disabled", "true");
              btn.classList.add("is-disabled");
              btn.textContent = t("not_available");
            }

            card.appendChild(head);
            card.appendChild(btn);
            container.appendChild(card);
          });

          var tag = (release && (release.tag_name || release.name)) || "";
          document.getElementById("version-text").innerHTML =
            t("version_latest") + " <strong>" + (tag || "—") + "</strong>";
        }

        function showErrorTranslated(kind, httpStatus) {
          lastErrorKind = kind;
          var el = document.getElementById("error-banner");
          var msg =
            kind === "no_assets"
              ? t("error_no_assets")
              : kind === "fetch"
                ? t("error_fetch") +
                  (httpStatus ? " (" + httpStatus + ")." : ".")
                : t("error_network");
          el.textContent = msg;
          el.classList.remove("hidden");
        }

        function hideError() {
          lastErrorKind = null;
          document.getElementById("error-banner").classList.add("hidden");
        }

        function setLang(lang) {
          if (lang !== "it" && lang !== "en") return;
          currentLang = lang;
          try {
            localStorage.setItem(STORAGE_KEY, lang);
          } catch (e) {}
          setUrlLang(lang);
          applyStaticCopy();

          if (lastFetch) {
            renderCards(lastFetch.assets, lastFetch.release);
            if (lastFetch.assets.length === 0) {
              showErrorTranslated("no_assets");
            } else {
              hideError();
            }
          } else if (lastErrorKind) {
            showErrorTranslated(
              lastErrorKind,
              lastErrorKind === "fetch" ? lastFetchHttpStatus : undefined
            );
          }
        }

        function wireLangButtons() {
          document.querySelectorAll(".lang-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var lang = btn.getAttribute("data-set-lang");
              if (lang) setLang(lang);
            });
          });
        }

        currentLang = detectLang();
        applyStaticCopy();
        wireLangButtons();

        function isInstallerAsset(name) {
          if (!name || /latest\.json$/i.test(name)) return false;
          if (/\.sig$/i.test(name)) return false;
          return true;
        }

        function runFetch() {
          fetch(API)
            .then(function (r) {
              lastFetchHttpStatus = r.status;
              if (!r.ok) {
                lastFetch = null;
                throw { kind: "fetch", status: r.status };
              }
              return r.json();
            })
            .then(function (release) {
              document.getElementById("loading").classList.add("hidden");
              document.getElementById("content").classList.remove("hidden");

              var assets = (release.assets || []).filter(function (a) {
                return isInstallerAsset(a.name);
              });
              lastFetch = { assets: assets, release: release };
              hideError();

              if (assets.length === 0) {
                showErrorTranslated("no_assets");
              }
              renderCards(assets, release);
            })
            .catch(function (err) {
              document.getElementById("loading").classList.add("hidden");
              document.getElementById("content").classList.remove("hidden");
              lastFetch = null;
              document.getElementById("version-text").textContent = t("version_unknown");

              if (err && err.kind === "fetch") {
                showErrorTranslated("fetch", err.status);
              } else {
                showErrorTranslated("network");
              }
              renderCards([], {});
            });
        }

        runFetch();
      })();
    </script>
  </body>
</html>
