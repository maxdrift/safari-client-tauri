name: Release (legacy WebKit)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    if: ${{ endsWith(github.ref_name, '-legacy') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload to GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Safari Client ${{ github.ref_name }} (legacy WebKit)
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}

  # Updater endpoint in tauri.conf uses latest-legacy.json; tauri-action uploads latest.json.
  upstream-alias:
    name: Upload latest-legacy.json for updater
    if: ${{ endsWith(github.ref_name, '-legacy') }}
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Duplicate latest.json as latest-legacy.json on release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          mkdir -p /tmp/gh-assets
          if ! gh release download "$TAG" --pattern 'latest.json' -D /tmp/gh-assets 2>/dev/null; then
            echo "No latest.json on release $TAG (skip alias)."
            exit 0
          fi
          if [[ -f /tmp/gh-assets/latest.json ]]; then
            cp /tmp/gh-assets/latest.json latest-legacy.json
            gh release upload "$TAG" latest-legacy.json --clobber
            echo "Uploaded latest-legacy.json for updater endpoint."
          fi
